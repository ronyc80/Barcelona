  function render(){
    const dist=tracks.reduce((s,t)=>s+t.dist,0), gain=tracks.reduce((s,t)=>s+t.gain,0);
    $('routesCount').textContent=tracks.length; $('distTotal').textContent=dist.toFixed(1); $('gainTotal').textContent=Math.round(gain);
    $('topSub').textContent=`${tracks.length} מסלולים · ${dist.toFixed(1)} ק״מ · ${Math.round(gain)} מ׳ טיפוס`;
    $('tracksList').innerHTML=tracks.map((t,i)=>`<div class="track"><input class="check" type="checkbox" data-i="${i}" ${t.visible?'checked':''}/><div><div class="track-name" style="color:${t.color}">${t.name}</div><div class="track-meta">${t.dist.toFixed(1)} ק״מ · ${Math.round(t.gain)} מ׳ טיפוס</div></div><button class="zoom" data-zoom="${i}">התמקד</button></div>`).join('');
    $('poisList').innerHTML=pois.map(p=>`<div class="poi"><b>📍 ${p[0]}</b><span>✓ ביקרנו</span></div>`).join('');
    document.querySelectorAll('.check').forEach(x=>x.onchange=e=>toggleTrack(+e.target.dataset.i,e.target.checked));
    document.querySelectorAll('[data-zoom]').forEach(b=>b.onclick=e=>selectTrack(+e.target.dataset.zoom));
  }
  function toggleTrack(i,on){ tracks[i].visible=on; if(on){ trackLayers[i].addTo(map); if(heatOn) heatLayers[i].addTo(map); } else { map.removeLayer(trackLayers[i]); map.removeLayer(heatLayers[i]); } bringRoutesFront(); }
  function bringRoutesFront(){ heatLayers.forEach(h=>{ if(map.hasLayer(h)) h.bringToBack(); }); trackLayers.forEach(l=>{ if(map.hasLayer(l)) l.bringToFront(); }); if(poisOn) poiLayer.bringToFront(); }
  function selectTrack(i){ trackLayers.forEach((l,k)=>l.setStyle({weight:k===i?10:6,opacity:k===i?1:.5})); bringRoutesFront(); const b=trackLayers[i].getBounds(); if(b.isValid()) map.fitBounds(b.pad(.25),{animate:true}); toast(tracks[i].name+' · '+tracks[i].dist.toFixed(1)+' ק״מ'); }
  $('fitBtn').onclick=()=>{ trackLayers.forEach(l=>l.setStyle({weight:7,opacity:.95})); bringRoutesFront(); if(allBounds&&allBounds.isValid()) map.fitBounds(allBounds.pad(.13)); };
  $('heatBtn').onclick=()=>{ heatOn=!heatOn; $('heatBtn').classList.toggle('active',heatOn); heatLayers.forEach((h,i)=>{ if(heatOn&&tracks[i].visible) h.addTo(map); else map.removeLayer(h); }); bringRoutesFront(); toast(heatOn?'Heat Map פועל':'Heat Map כבוי'); };
  $('poiBtn').onclick=()=>{ poisOn=!poisOn; $('poiBtn').classList.toggle('active',poisOn); if(poisOn) poiLayer.addTo(map); else map.removeLayer(poiLayer); bringRoutesFront(); toast(poisOn?'נקודות עניין מוצגות':'נקודות עניין מוסתרות'); };
  $('toggleSheet').onclick=()=>{ $('sheet').classList.toggle('open'); setTimeout(()=>map.invalidateSize(),260); };
  document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{ document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active')); document.querySelectorAll('.panel').forEach(x=>x.classList.remove('active')); b.classList.add('active'); $(b.dataset.tab+'Panel').classList.add('active'); });
  window.addEventListener('orientationchange',()=>setTimeout(()=>map.invalidateSize(),500));
  initMap(); draw(TRACKS_GEOJSON);
})();
</script>
<script type="module">
  import { inject } from 'https://cdn.jsdelivr.net/npm/@vercel/analytics@1/dist/index.mjs';
  inject();
</script>
