<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
<title>טיול משפחתי ברצלונה 2026</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
<style>
  html, body { margin:0; height:100%; overflow:hidden; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif; background:#111827; color:#111827; }
  #map { position:fixed; inset:0; z-index:1; direction:ltr; background:#dbeafe; touch-action:pan-x pan-y; }
  .leaflet-container { width:100%; height:100%; direction:ltr; font-family:inherit; }
  .leaflet-container img, .leaflet-tile { max-width:none !important; max-height:none !important; }
  .leaflet-control-attribution { font-size:10px; }
  .top-card { position:fixed; z-index:20; top:calc(env(safe-area-inset-top) + 14px); left:16px; right:16px; background:rgba(255,255,255,.94); backdrop-filter:blur(14px); border-radius:28px; padding:13px 18px; text-align:center; box-shadow:0 10px 30px rgba(0,0,0,.18); pointer-events:none; }
  .top-card h1 { margin:0; font-size:20px; line-height:1.15; font-weight:900; }
  .top-card .sub { margin-top:5px; color:#64748b; font-size:14px; font-weight:800; }
  .fab-col { position:fixed; z-index:25; left:18px; top:42%; display:flex; flex-direction:column; gap:12px; }
  .fab { width:56px; height:56px; border-radius:50%; border:0; background:rgba(255,255,255,.94); box-shadow:0 9px 24px rgba(0,0,0,.20); font-size:24px; display:flex; align-items:center; justify-content:center; -webkit-tap-highlight-color:transparent; }
  .fab.active { background:#111827; color:#fff; }
  .sheet { position:fixed; z-index:30; left:0; right:0; bottom:0; background:rgba(255,255,255,.96); backdrop-filter:blur(16px); border-radius:28px 28px 0 0; box-shadow:0 -12px 35px rgba(0,0,0,.20); padding:10px 18px calc(env(safe-area-inset-bottom) + 16px); max-height:44vh; transform:translateY(calc(100% - 84px)); transition:transform .22s ease; overflow:hidden; direction:rtl; }
  .sheet.open { transform:translateY(0); }
  .handle { width:72px; height:7px; background:#dbe3ef; border-radius:999px; margin:0 auto 10px; }
  .sheet-head { display:flex; align-items:center; justify-content:space-between; gap:10px; }
  .sheet-title h2 { margin:0; font-size:24px; font-weight:900; }
  .sheet-title p { margin:4px 0 0; color:#64748b; font-size:14px; font-weight:700; }
  .toggle { flex:0 0 auto; width:54px; height:54px; border-radius:50%; border:0; background:#f8fafc; box-shadow:0 6px 18px rgba(0,0,0,.10); color:#0284c7; font-size:22px; }
  .content { overflow:auto; max-height:calc(44vh - 105px); padding-top:12px; -webkit-overflow-scrolling:touch; }
  .stats { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:12px; }
  .stat { background:#f1f5f9; border-radius:16px; padding:12px 8px; text-align:center; }
  .stat b { display:block; font-size:22px; }
  .stat span { color:#64748b; font-size:12px; font-weight:800; }
  .tabs { display:flex; gap:8px; margin:6px 0 12px; }
  .tab { border:0; border-radius:999px; background:#e2e8f0; padding:10px 14px; font-weight:900; color:#0f172a; }
  .tab.active { background:#111827; color:#fff; }
  .panel { display:none; }
  .panel.active { display:block; }
  .track { display:grid; grid-template-columns:40px 1fr 70px; align-items:center; gap:10px; padding:11px 0; border-bottom:1px solid #e2e8f0; }
  .swatch { width:20px; height:20px; border-radius:6px; justify-self:center; }
  .track-name { font-weight:900; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; direction:rtl; }
  .track-meta { color:#64748b; font-size:13px; font-weight:700; margin-top:3px; }
  .zoom-btn { border:0; border-radius:999px; background:#eff6ff; color:#1d4ed8; padding:9px 10px; font-weight:900; }
  .legend { background:#f8fafc; border-radius:16px; padding:12px; color:#334155; font-weight:800; line-height:1.9; }
  .poi { display:flex; align-items:center; justify-content:space-between; padding:10px 0; border-bottom:1px solid #e2e8f0; font-weight:900; }
  .error { position:fixed; z-index:50; left:14px; right:14px; top:110px; background:#fee2e2; color:#991b1b; border-radius:16px; padding:12px; font-weight:800; display:none; direction:rtl; }
</style>
</head>
<body>
<div id="map"></div>
<div id="error" class="error"></div>
<div class="top-card">
  <h1>🇪🇸 טיול משפחתי ברצלונה 2026</h1>
  <div class="sub" id="topStats">טוען מסלולים...</div>
</div>
<div class="fab-col">
  <button class="fab" id="fitBtn" title="התמקד">⌖</button>
  <button class="fab" id="heatBtn" title="Heat Map">🔥</button>
  <button class="fab" id="sheetBtn" title="Dashboard">☰</button>
</div>
<div class="sheet" id="sheet">
  <div class="handle"></div>
  <div class="sheet-head">
    <button class="toggle" id="toggleSheet">⌃</button>
    <div class="sheet-title"><h2>Barcelona 🇪🇸</h2><p>לחץ לפתיחה/סגירה. בלי גרירה כדי שלא יפריע למפה.</p></div>
  </div>
  <div class="content">
    <div class="stats">
      <div class="stat"><b id="statTracks">0</b><span>מסלולים</span></div>
      <div class="stat"><b id="statKm">0</b><span>ק״מ</span></div>
      <div class="stat"><b id="statGain">0</b><span>מ׳ טיפוס</span></div>
    </div>
    <div class="tabs">
      <button class="tab active" data-panel="tracks">מסלולים</button>
      <button class="tab" data-panel="legend">מקרא</button>
      <button class="tab" data-panel="poi">אתרים</button>
    </div>
    <div class="panel active" id="tracks"></div>
    <div class="panel" id="legend">
      <div class="legend">
        <div>● קו צבעוני עבה = מסלול שבו הלכתם.</div>
        <div>🔥 Heat Map = אזורים שחזרתם אליהם יותר מסומנים חזק יותר.</div>
        <div>⌖ התמקד = התאמה לכל המסלולים.</div>
        <div>לחיצה על מסלול במפה או ברשימה מדגישה אותו.</div>
      </div>
    </div>
    <div class="panel" id="poi"></div>
  </div>
</div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
<script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>
<script>
(function(){
  const colors=['#ef4444','#3b82f6','#22c55e','#a855f7','#f97316','#92400e','#ec4899'];
  const pois=[
    ['סגרדה פמיליה',41.4036,2.1744],['פארק גואל',41.4145,2.1527],['הרובע הגותי',41.3839,2.1763],
    ['שער הניצחון',41.3910,2.1800],['בונקרים דל כרמל',41.4183,2.1619],['נמל ברצלונה',41.3763,2.1840],['גרסיה',41.4030,2.1580]
  ];
  let map, bounds, heatLayer=null, heatVisible=false, allLayer=L.featureGroup(), routeLayers=[];
  function $(id){return document.getElementById(id)}
  function showError(msg){$('error').textContent=msg; $('error').style.display='block'}
  function km(n){return (Math.round(n*10)/10).toString()}
  function openSheet(open){ $('sheet').classList.toggle('open', open); $('toggleSheet').textContent=open?'⌄':'⌃'; setTimeout(()=>map && map.invalidateSize(),80); }
  function toggleSheet(){ openSheet(!$('sheet').classList.contains('open')); }
  function setupMap(){
    map=L.map('map',{zoomControl:false,attributionControl:true,tap:true,preferCanvas:true});
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19, crossOrigin:true, attribution:'© OpenStreetMap'}).addTo(map);
    allLayer.addTo(map);
    map.setView([41.39,2.17],12);
    setTimeout(()=>map.invalidateSize(true),250);
    setTimeout(()=>map.invalidateSize(true),1000);
  }
  function lineCoords(feature){return feature.geometry.coordinates.map(c=>[c[1],c[0]]);}
  function selectRoute(i){
    routeLayers.forEach((l,idx)=>l.setStyle({weight:idx===i?9:6, opacity:idx===i?1:.88}));
    const b=routeLayers[i].getBounds(); map.fitBounds(b,{paddingTopLeft:[40,105],paddingBottomRight:[40,120],maxZoom:15});
    openSheet(true);
  }
  function build(data){
    const features=data.features||[]; let totalKm=0,totalGain=0; const heat=[];
    features.forEach((f,i)=>{
      const p=f.properties||{}; totalKm+=Number(p.distance_km||0); totalGain+=Number(p.gain_m||0);
      const coords=lineCoords(f); coords.forEach((ll,idx)=>{ if(idx%5===0) heat.push([ll[0],ll[1],0.55]); });
      const layer=L.polyline(coords,{color:colors[i%colors.length],weight:6,opacity:.9,lineCap:'round',lineJoin:'round'}).addTo(allLayer);
      layer.on('click',()=>selectRoute(i)); routeLayers.push(layer);
    });
    bounds=allLayer.getBounds(); if(bounds.isValid()) map.fitBounds(bounds,{paddingTopLeft:[35,120],paddingBottomRight:[35,140],maxZoom:13});
    if(window.L.heatLayer){ heatLayer=L.heatLayer(heat,{radius:22,blur:18,maxZoom:17,minOpacity:.35,gradient:{0.25:'#22c55e',0.5:'#facc15',0.75:'#fb923c',1:'#ef4444'}}); }
    pois.forEach(([name,lat,lng])=>L.marker([lat,lng]).bindPopup(name).addTo(map));
    $('topStats').textContent=`${features.length} מסלולים • ${km(totalKm)} ק״מ • ${Math.round(totalGain)} מ׳ טיפוס`;
    $('statTracks').textContent=features.length; $('statKm').textContent=km(totalKm); $('statGain').textContent=Math.round(totalGain);
    const list=$('tracks'); list.innerHTML='';
    features.forEach((f,i)=>{ const p=f.properties||{}; const row=document.createElement('div'); row.className='track'; row.innerHTML=`<div class="swatch" style="background:${colors[i%colors.length]}"></div><div><div class="track-name">${p.name||'מסלול'}</div><div class="track-meta">${km(Number(p.distance_km||0))} ק״מ • ${Math.round(Number(p.gain_m||0))} מ׳ טיפוס</div></div><button class="zoom-btn">התמקד</button>`; row.querySelector('button').onclick=()=>selectRoute(i); list.appendChild(row); });
    const poiDiv=$('poi'); poiDiv.innerHTML=''; pois.forEach(([name])=>{ const d=document.createElement('div'); d.className='poi'; d.innerHTML=`<span>${name}</span><span>📍</span>`; poiDiv.appendChild(d); });
  }
  window.addEventListener('load',()=>{
    setupMap();
    fetch('tracks.geojson',{cache:'no-store'}).then(r=>{if(!r.ok) throw new Error('tracks.geojson לא נטען'); return r.json();}).then(build).catch(e=>showError('שגיאה בטעינת המסלולים: '+e.message));
    $('fitBtn').onclick=()=>{ if(bounds && bounds.isValid()) map.fitBounds(bounds,{paddingTopLeft:[35,120],paddingBottomRight:[35,140],maxZoom:13}); };
    $('heatBtn').onclick=()=>{ if(!heatLayer) return showError('ספריית Heat Map לא נטענה. המסלולים עצמם עדיין תקינים.'); heatVisible=!heatVisible; $('heatBtn').classList.toggle('active',heatVisible); heatVisible?heatLayer.addTo(map):map.removeLayer(heatLayer); };
    $('sheetBtn').onclick=toggleSheet; $('toggleSheet').onclick=toggleSheet;
    document.querySelectorAll('.tab').forEach(btn=>btn.onclick=()=>{ document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active')); document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active')); btn.classList.add('active'); $(btn.dataset.panel).classList.add('active'); });
  });
})();
</script>
</body>
</html>
