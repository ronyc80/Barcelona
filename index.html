<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <title>Rony Explorer · Barcelona</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
  <style>
    :root{--bg:#0b1020;--card:rgba(255,255,255,.94);--ink:#111827;--muted:#64748b;--blue:#2563eb;--shadow:0 18px 45px rgba(0,0,0,.24)}
    html,body,#map{height:100%;margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:#111;overflow:hidden}
    #map{position:fixed;inset:0;z-index:1}.leaflet-control-container{display:none}.leaflet-tile{filter:saturate(1.05) contrast(.98)}
    .top-pill{position:fixed;z-index:20;top:calc(env(safe-area-inset-top) + 12px);left:16px;right:16px;background:var(--card);border-radius:28px;padding:12px 18px;box-shadow:var(--shadow);text-align:center;backdrop-filter:blur(12px)}
    .title{font-weight:800;font-size:18px;color:var(--ink)}.sub{font-size:13px;color:var(--muted);margin-top:4px}
    .fabcol{position:fixed;z-index:25;left:18px;bottom:230px;display:flex;flex-direction:column;gap:12px}.fab{width:56px;height:56px;border-radius:50%;border:0;background:var(--card);box-shadow:var(--shadow);font-size:24px;display:grid;place-items:center;color:var(--blue)}.fab.active{background:#111827;color:white}
    .sheet{position:fixed;z-index:30;left:0;right:0;bottom:0;max-height:72vh;background:var(--card);border-radius:28px 28px 0 0;box-shadow:0 -18px 45px rgba(0,0,0,.28);transform:translateY(calc(100% - 132px));transition:transform .25s ease;backdrop-filter:blur(14px);padding-bottom:env(safe-area-inset-bottom)}
    .sheet.open{transform:translateY(0)}.handle{width:74px;height:6px;background:#cbd5e1;border-radius:999px;margin:12px auto 10px}.sheet-head{display:flex;align-items:center;justify-content:space-between;padding:0 22px 10px}.sheet h1{font-size:24px;margin:0;color:var(--ink)}.hint{font-size:14px;color:var(--muted);margin-top:4px}.chev{width:48px;height:48px;border-radius:50%;border:0;background:white;box-shadow:0 8px 24px rgba(0,0,0,.12);font-size:22px;color:var(--blue)}
    .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:10px 18px}.stat{background:#f1f5f9;border-radius:18px;padding:12px;text-align:center}.num{font-size:24px;font-weight:800;color:#0f172a}.label{font-size:12px;color:var(--muted)}
    .tabs{display:flex;gap:8px;padding:2px 18px 12px}.tab{flex:1;border:0;border-radius:16px;padding:12px;background:#e5e7eb;color:#111827;font-weight:700}.tab.active{background:#111827;color:white}.content{overflow:auto;max-height:calc(72vh - 190px);padding:0 18px 18px}.track{direction:rtl;display:flex;align-items:center;gap:10px;background:white;border-radius:18px;margin:10px 0;padding:12px 12px;box-shadow:0 1px 0 #e5e7eb}.sw{width:14px;height:14px;border-radius:5px;flex:0 0 14px}.tname{flex:1;font-weight:700;color:#111827;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.tdist{color:var(--muted);font-size:13px}.eye{border:0;background:#eaf2ff;color:var(--blue);border-radius:999px;padding:8px 10px;font-weight:800}.legend{font-size:13px;color:#334155;line-height:1.7;padding:8px 4px 16px}.toast{position:fixed;z-index:40;left:18px;right:18px;bottom:150px;background:#111827;color:white;border-radius:18px;padding:14px 16px;box-shadow:var(--shadow);display:none;text-align:center;direction:rtl}.toast.show{display:block}
  </style>
</head>
<body>
  <div id="map"></div>
  <div class="top-pill"><div class="title">Rony Explorer · Barcelona</div><div class="sub" id="summary">טוען מסלולים...</div></div>
  <div class="fabcol"><button class="fab" id="fitBtn">⌖</button><button class="fab" id="heatBtn">🔥</button><button class="fab" id="tracksBtn">☰</button></div>
  <section class="sheet" id="sheet"><div class="handle"></div><div class="sheet-head"><div><h1>Barcelona 🇪🇸</h1><div class="hint">גרור למעלה/למטה או לחץ לפתיחה</div></div><button class="chev" id="toggleSheet">⌄</button></div><div class="stats"><div class="stat"><div class="num" id="sTracks">-</div><div class="label">מסלולים</div></div><div class="stat"><div class="num" id="sKm">-</div><div class="label">ק״מ</div></div><div class="stat"><div class="num" id="sClimb">-</div><div class="label">מ׳ טיפוס</div></div></div><div class="tabs"><button class="tab active" id="tabRoutes">מסלולים</button><button class="tab" id="tabLegend">מקרא</button></div><div class="content" id="content"></div></section>
  <div class="toast" id="toast"></div>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>
  <script>
    const colors=['#ef4444','#3b82f6','#22c55e','#a855f7','#f97316','#92400e','#ec4899','#14b8a6'];
    let map,geo,group,heatLayer,heatOn=false,layers=[],allBounds;
    const $=id=>document.getElementById(id); const toast=t=>{const el=$('toast');el.textContent=t;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2200)};
    function dist(coords){let d=0;for(let i=1;i<coords.length;i++){d+=h(coords[i-1],coords[i])}return d/1000}
    function h(a,b){const R=6371000,rad=x=>x*Math.PI/180;const dLat=rad(b[1]-a[1]),dLon=rad(b[0]-a[0]);const la1=rad(a[1]),la2=rad(b[1]);const x=Math.sin(dLat/2)**2+Math.cos(la1)*Math.cos(la2)*Math.sin(dLon/2)**2;return 2*R*Math.asin(Math.sqrt(x))}
    function climb(coords){let c=0;for(let i=1;i<coords.length;i++){const a=coords[i-1][2],b=coords[i][2];if(a!=null&&b!=null&&b>a)c+=b-a}return c}
    function eachLine(feature){const g=feature.geometry;if(!g)return[];if(g.type==='LineString')return[g.coordinates];if(g.type==='MultiLineString')return g.coordinates;return[]}
    async function init(){
      map=L.map('map',{zoomControl:false,attributionControl:false,preferCanvas:true});
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,crossOrigin:true}).addTo(map);
      group=L.featureGroup().addTo(map);
      geo=await fetch('tracks.geojson',{cache:'no-store'}).then(r=>r.json());
      let totalKm=0,totalClimb=0,heat=[]; allBounds=L.latLngBounds();
      geo.features.forEach((f,idx)=>{const name=(f.properties&&f.properties.name)||`מסלול ${idx+1}`;let coordsFlat=[];eachLine(f).forEach(c=>coordsFlat=coordsFlat.concat(c)); const km=dist(coordsFlat), cl=climb(coordsFlat); totalKm+=km; totalClimb+=cl;
        const latlngs=coordsFlat.map(p=>[p[1],p[0]]); latlngs.forEach(ll=>{allBounds.extend(ll); heat.push([ll[0],ll[1],0.55]);});
        const layer=L.polyline(latlngs,{color:colors[idx%colors.length],weight:6,opacity:.95,lineCap:'round',lineJoin:'round'}).addTo(group);
        layer.meta={name,km,cl,idx,visible:true,color:colors[idx%colors.length]}; layer.on('click',()=>selectTrack(layer)); layers.push(layer);
      });
      heatLayer=L.heatLayer(heat,{radius:22,blur:18,maxZoom:17,minOpacity:.35,gradient:{0.25:'blue',0.5:'lime',0.75:'yellow',1:'red'}});
      $('sTracks').textContent=layers.length; $('sKm').textContent=totalKm.toFixed(1); $('sClimb').textContent=Math.round(totalClimb); $('summary').textContent=`${layers.length} מסלולים · ${totalKm.toFixed(1)} ק״מ · ${Math.round(totalClimb)} מ׳ טיפוס`;
      renderRoutes(); fitAll();
    }
    function fitAll(){ if(allBounds&&allBounds.isValid()) map.fitBounds(allBounds,{paddingTopLeft:[32,100],paddingBottomRight:[32,170],maxZoom:14}); }
    function selectTrack(layer){ layers.forEach(l=>l.setStyle({weight:5,opacity:.35})); layer.setStyle({weight:9,opacity:1}).bringToFront(); map.fitBounds(layer.getBounds(),{paddingTopLeft:[28,100],paddingBottomRight:[28,170],maxZoom:16}); toast(`${layer.meta.name} · ${layer.meta.km.toFixed(1)} ק״מ · ${Math.round(layer.meta.cl)} מ׳ טיפוס`); }
    function renderRoutes(){ $('content').innerHTML=layers.map((l,i)=>`<div class="track" data-i="${i}"><span class="sw" style="background:${l.meta.color}"></span><div class="tname">${l.meta.name}</div><div class="tdist">${l.meta.km.toFixed(1)} ק״מ</div><button class="eye" data-eye="${i}">${l.meta.visible?'הסתר':'הצג'}</button></div>`).join('');
      document.querySelectorAll('.track').forEach(el=>el.addEventListener('click',e=>{if(e.target.dataset.eye)return;openSheet(false);selectTrack(layers[+el.dataset.i])}));
      document.querySelectorAll('[data-eye]').forEach(btn=>btn.addEventListener('click',e=>{e.stopPropagation();const l=layers[+btn.dataset.eye];l.meta.visible=!l.meta.visible;if(l.meta.visible)l.addTo(group);else group.removeLayer(l);renderRoutes();})); }
    function renderLegend(){ $('content').innerHTML='<div class="legend"><b>מה רואים במפה?</b><br>הקווים הצבעוניים הם המסלולים שלך בפועל. לחיצה על מסלול מדגישה אותו ומתמקדת בו.<br><br><b>Heat Map</b><br>הפעלת 🔥 מציגה שכבת חום מעל המסלולים: כחול/ירוק = מעבר בודד, צהוב/אדום = אזורים שחזרת אליהם או שהנקודות צפופות יותר.<br><br><b>כפתור ⌖</b><br>מחזיר לתמונה הכללית של כל ברצלונה שביקרת בה.</div>'; }
    function openSheet(v){const s=$('sheet');s.classList.toggle('open',v);$('toggleSheet').textContent=v?'⌃':'⌄'}
    $('toggleSheet').onclick=()=>openSheet(!$('sheet').classList.contains('open')); $('tracksBtn').onclick=()=>openSheet(!$('sheet').classList.contains('open')); $('fitBtn').onclick=()=>{layers.forEach(l=>l.setStyle({weight:6,opacity:.95}));fitAll()};
    $('heatBtn').onclick=()=>{heatOn=!heatOn;$('heatBtn').classList.toggle('active',heatOn); if(heatOn){heatLayer.addTo(map);group.bringToFront();toast('Heat Map הופעל')}else{map.removeLayer(heatLayer);toast('Heat Map כבוי')}};
    $('tabRoutes').onclick=()=>{$('tabRoutes').classList.add('active');$('tabLegend').classList.remove('active');renderRoutes()}; $('tabLegend').onclick=()=>{$('tabLegend').classList.add('active');$('tabRoutes').classList.remove('active');renderLegend()};
    let startY=0; $('sheet').addEventListener('touchstart',e=>startY=e.touches[0].clientY,{passive:true}); $('sheet').addEventListener('touchend',e=>{const dy=e.changedTouches[0].clientY-startY;if(dy<-40)openSheet(true);if(dy>40)openSheet(false)},{passive:true});
    init().catch(e=>{console.error(e);$('summary').textContent='שגיאה בטעינת tracks.geojson';toast('לא הצלחתי לטעון את tracks.geojson')});
  </script>
</body>
</html>
