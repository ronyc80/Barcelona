<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Barcelona Trip Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIINfQkXbMCRp2A5Jg9jopvzfBMm2dDhxN2I=" crossorigin="" />
  <style>
    :root { --card: rgba(255,255,255,.94); --text:#172033; --muted:#667085; }
    html, body { height: 100%; margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; color: var(--text); }
    #map { position: fixed; inset: 0; z-index: 0; }
    .panel { position: fixed; left: 12px; right: 12px; top: max(12px, env(safe-area-inset-top)); z-index: 1000; background: var(--card); border-radius: 18px; box-shadow: 0 6px 28px rgba(0,0,0,.20); padding: 12px; backdrop-filter: blur(10px); max-height: 42vh; overflow: auto; }
    h1 { font-size: 18px; margin: 0 0 8px; }
    .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 10px; direction: rtl; }
    .stat { background:#f4f6f8; border-radius: 12px; padding: 8px; text-align:center; }
    .stat b { display:block; font-size: 18px; }
    .stat span { font-size: 12px; color: var(--muted); }
    .actions { display:flex; gap:8px; margin-bottom: 8px; }
    button { border:0; border-radius: 999px; padding: 9px 12px; background:#111827; color:#fff; font-weight:600; }
    button.secondary { background:#e7ebf0; color:#111827; }
    .track { display:flex; align-items:center; gap:8px; border-top:1px solid #e6e8ec; padding:8px 0; font-size:14px; }
    .swatch { width:11px; height:11px; border-radius:3px; flex:0 0 auto; }
    .track label { flex:1; line-height:1.25; }
    .track small { color:var(--muted); white-space:nowrap; }
    .leaflet-control-attribution { font-size: 10px; }
    @media (min-width: 760px) { .panel { left:auto; right:20px; width:420px; max-height:calc(100vh - 40px); } }
  </style>
</head>
<body>
<div id="map"></div>
<section class="panel">
  <h1>Barcelona — מפת הטיול</h1>
  <div class="stats">
    <div class="stat"><b id="totalKm">–</b><span>ק״מ</span></div>
    <div class="stat"><b id="totalGain">–</b><span>טיפוס מ׳</span></div>
    <div class="stat"><b id="trackCount">–</b><span>מסלולים</span></div>
  </div>
  <div class="actions">
    <button id="fitBtn">התאם למסלולים</button>
    <button id="heatBtn" class="secondary">Heat Map</button>
    <button id="routesBtn" class="secondary">מסלולים</button>
  </div>
  <div id="tracks"></div>
</section>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
<script>
const colors = ['#ef4444','#3b82f6','#22c55e','#a855f7','#f97316','#92400e','#ec4899','#14b8a6'];
const map = L.map('map', { zoomControl: false }).setView([41.389, 2.153], 13);
L.control.zoom({ position: 'bottomleft' }).addTo(map);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19,
  attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);
const routeLayer = L.layerGroup().addTo(map);
let heatLayer = null;
let bounds = null;
let routeVisible = true;
let heatVisible = true;
const lineLayers = [];
function km(n){ return (Math.round(n*10)/10).toLocaleString('he-IL'); }
function allCoords(geom){ return geom.type === 'LineString' ? geom.coordinates : geom.coordinates.flat(); }
fetch('tracks.geojson').then(r=>r.json()).then(data => {
  let totalKm = 0, totalGain = 0, heat = [];
  const list = document.getElementById('tracks');
  data.features.forEach((f, i) => {
    const color = colors[i % colors.length];
    const coords = allCoords(f.geometry).map(c => [c[1], c[0]]);
    totalKm += Number(f.properties.distance_km || 0);
    totalGain += Number(f.properties.gain_m || 0);
    coords.forEach((p, idx) => { if (idx % 3 === 0) heat.push([p[0], p[1], 0.55]); });
    const line = L.polyline(coords, { color, weight: 4, opacity: .9 }).bindPopup(`<b>${f.properties.name}</b><br>${km(f.properties.distance_km)} ק״מ<br>${Math.round(f.properties.gain_m||0)} מ׳ טיפוס`);
    line.addTo(routeLayer); lineLayers.push(line);
    bounds = bounds ? bounds.extend(line.getBounds()) : line.getBounds();
    const row = document.createElement('div'); row.className = 'track';
    row.innerHTML = `<input type="checkbox" checked id="t${i}"><span class="swatch" style="background:${color}"></span><label for="t${i}">${f.properties.name}</label><small>${km(f.properties.distance_km)} ק״מ</small>`;
    list.appendChild(row);
    row.querySelector('input').addEventListener('change', e => { e.target.checked ? line.addTo(routeLayer) : routeLayer.removeLayer(line); });
  });
  document.getElementById('totalKm').textContent = km(totalKm);
  document.getElementById('totalGain').textContent = Math.round(totalGain).toLocaleString('he-IL');
  document.getElementById('trackCount').textContent = data.features.length;
  heatLayer = L.heatLayer(heat, { radius: 20, blur: 22, maxZoom: 17, minOpacity: .25 }).addTo(map);
  if (bounds) map.fitBounds(bounds.pad(.12));
});
document.getElementById('fitBtn').onclick = () => bounds && map.fitBounds(bounds.pad(.12));
document.getElementById('heatBtn').onclick = () => { if (!heatLayer) return; heatVisible = !heatVisible; heatVisible ? heatLayer.addTo(map) : map.removeLayer(heatLayer); };
document.getElementById('routesBtn').onclick = () => { routeVisible = !routeVisible; routeVisible ? routeLayer.addTo(map) : map.removeLayer(routeLayer); };
</script>
</body>
</html>
